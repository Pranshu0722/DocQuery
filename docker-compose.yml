services:
  chat-app:
    build: .
    container_name: docquery
    ports:
      - "8501:8501"
    volumes:
      - .:/app        # Live code sync
      - /app/db       # Keep ChromaDB persistent inside the container
    environment:
      - IS_DOCKER=true
    # Allows the container to reach Ollama running on the host machine
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # 👇 Uncomment the block below if you have an NVIDIA GPU and want CUDA acceleration.
    # Requires NVIDIA Container Toolkit installed on the host.
    #
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
