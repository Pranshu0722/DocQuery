version: '3.8'

services:
  chat-app:
    build: .
    container_name: pdf_chat_gpu
    ports:
      - "8501:8501"
    volumes:
      - .:/app            # Syncs your folder to the container (Live Coding)
      - /app/db           # Prevents DB from being overwritten by sync
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    # 👇 This allows the container to talk to Ollama on your Windows Host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    
    # 👇 GPU Reservation
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]